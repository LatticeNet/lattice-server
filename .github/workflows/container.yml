name: container

# Image builds are TAG-DRIVEN only — nothing is built or published on ordinary
# pushes/PRs. Triggers:
#   - latest    → rolling latest: publishes `latest`
#   - alpha     → rolling alpha: publishes `alpha`
#   - alpha-*   → pinned alpha (e.g. alpha-0.2.4): publishes that exact tag name
#   - v*        → immutable release: publishes {{version}} and {{major}}.{{minor}}
#   - manual    → workflow_dispatch builds for validation but does NOT push
on:
  push:
    tags:
      - "latest"
      - "v*"
      - "alpha"
      - "alpha-*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout lattice-server
        uses: actions/checkout@v6
        with:
          path: lattice-server
      - name: checkout lattice-sdk matching ref
        id: checkout-sdk-ref
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: LatticeNet/lattice-sdk
          ref: ${{ github.head_ref || github.ref_name }}
          path: lattice-sdk
      - name: reset failed sdk checkout
        if: steps.checkout-sdk-ref.outcome == 'failure'
        run: rm -rf lattice-sdk
      - name: checkout lattice-sdk default ref
        if: steps.checkout-sdk-ref.outcome == 'failure'
        uses: actions/checkout@v6
        with:
          repository: LatticeNet/lattice-sdk
          path: lattice-sdk
      - name: read dashboard ref
        id: dashboard
        run: echo "ref=$(cat lattice-server/dashboard.ref)" >> "$GITHUB_OUTPUT"
      - name: checkout lattice-dashboard
        uses: actions/checkout@v6
        with:
          repository: LatticeNet/lattice-dashboard
          ref: ${{ steps.dashboard.outputs.ref }}
          path: lattice-dashboard
      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4
      - name: log in to ghcr
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/latticenet/lattice-server
          # No sha/branch tags: every published tag is an intentional release or alpha.
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/tags/latest' }}
            type=raw,value=alpha,enable=${{ github.ref == 'refs/tags/alpha' }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/alpha-') }}
            type=raw,value=manual-${{ github.run_id }},enable=${{ github.event_name == 'workflow_dispatch' }}
      - name: build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: lattice-server
          file: lattice-server/Dockerfile
          build-contexts: |
            lattice-sdk=./lattice-sdk
            lattice-dashboard=./lattice-dashboard
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
            DASHBOARD_COMMIT=${{ steps.dashboard.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
