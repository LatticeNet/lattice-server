name: container

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout lattice-server
        uses: actions/checkout@v4
        with:
          path: lattice-server
      - name: checkout lattice-sdk
        uses: actions/checkout@v4
        with:
          repository: LatticeNet/lattice-sdk
          path: lattice-sdk
      - name: checkout lattice-dashboard-next
        uses: actions/checkout@v4
        with:
          repository: LatticeNet/lattice-dashboard-next
          path: lattice-dashboard-next
      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3
      - name: log in to ghcr
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/latticenet/lattice-server
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - name: build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: lattice-server
          file: lattice-server/Dockerfile
          build-contexts: |
            lattice-sdk=./lattice-sdk
            lattice-dashboard=./lattice-dashboard-next
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
