name: container

on:
  push:
    tags:
      - "v*"
      - "alpha"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout lattice-server
        uses: actions/checkout@v6
        with:
          path: lattice-server
      - name: checkout lattice-sdk
        uses: actions/checkout@v6
        with:
          repository: LatticeNet/lattice-sdk
          path: lattice-sdk
      - name: read dashboard ref
        id: dashboard
        run: echo "ref=$(cat lattice-server/dashboard.ref)" >> "$GITHUB_OUTPUT"
      - name: checkout lattice-dashboard
        uses: actions/checkout@v6
        with:
          repository: LatticeNet/lattice-dashboard
          ref: ${{ steps.dashboard.outputs.ref }}
          path: lattice-dashboard
      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4
      - name: log in to ghcr
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/latticenet/lattice-server
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=alpha,enable=${{ github.ref == 'refs/tags/alpha' }}
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=manual-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' }}
      - name: build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: lattice-server
          file: lattice-server/Dockerfile
          build-contexts: |
            lattice-sdk=./lattice-sdk
            lattice-dashboard=./lattice-dashboard
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
            DASHBOARD_COMMIT=${{ steps.dashboard.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
